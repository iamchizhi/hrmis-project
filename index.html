<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HRMIS | Professional Suite</title>
    <!-- Font Awesome 6 (free vector icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter for modern professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* ========== LIGHT THEME (default) ========== */
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --accent: #2c7a4b;
            --accent-light: #dcfce7;
            --accent-hover: #1e5a3a;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.25rem;
        }

        /* ========== DARK THEME ========== */
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-sidebar: #111827;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-light: #334155;
            --accent: #4ade80;
            --accent-light: #14532d;
            --accent-hover: #22c55e;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4);
        }

        /* base styles */
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        /* login wrapper */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 1.5rem;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            width: 56px;
            height: 56px;
            background: var(--accent-light);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .login-logo i {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .login-card h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44, 122, 75, 0.2);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* theme toggle */
        .theme-toggle {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            width: auto;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 0.6rem 1rem;
            box-shadow: var(--shadow-md);
            width: auto;
            gap: 0.5rem;
        }

        .theme-toggle i {
            font-size: 1rem;
        }

        /* App container */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.2s;
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar-header i {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .sidebar-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .sidebar-nav {
            padding: 1.25rem;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 0.25rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sidebar-nav a i {
            width: 1.5rem;
            font-size: 1.1rem;
        }

        .sidebar-nav a:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .sidebar-nav a.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 600;
        }

        /* main content */
        .main-content {
            flex: 1;
            padding: 1.75rem 2rem;
            overflow-x: auto;
        }

        /* top bar (mobile) */
        .mobile-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .menu-icon {
            background: none;
            width: auto;
            padding: 0.5rem;
            font-size: 1.3rem;
        }

        /* cards & stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-info h4 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-info p {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-icon i {
            font-size: 2.5rem;
            color: var(--accent);
            opacity: 0.7;
        }

        .section-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 180px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-sm {
            width: auto;
            padding: 0.7rem 1.5rem;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.9rem 0.75rem;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-light);
        }

        td {
            padding: 0.9rem 0.75rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 0.25rem 0.7rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-warning {
            background: #fef3c7;
            color: #b45309;
        }

        body.dark .badge-warning {
            background: #713f12;
            color: #fde047;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                transition: left 0.2s ease;
                z-index: 30;
            }
            .sidebar.open {
                left: 0;
            }
            .main-content {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .form-row {
                flex-direction: column;
            }
            .btn-sm {
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .mobile-header {
                display: none;
            }
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div id="loginRoot" class="login-wrapper"></div>
    <div id="appRoot" style="display: none;"></div>
    <button class="theme-toggle" id="globalThemeToggle"><i class="fas fa-moon"></i> <span id="themeText">Dark</span></button>

    <script>
        // ---------- THEME MANAGEMENT ----------
        function initTheme() {
            const savedTheme = localStorage.getItem('hrmis_theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('themeText') && (document.getElementById('themeText').innerText = 'Light');
            } else {
                document.body.classList.remove('dark');
                document.getElementById('themeText') && (document.getElementById('themeText').innerText = 'Dark');
            }
        }
        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('hrmis_theme', 'light');
                document.getElementById('themeText').innerText = 'Dark';
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('hrmis_theme', 'dark');
                document.getElementById('themeText').innerText = 'Light';
            }
        }
        
        // ---------- DATA MODELS ----------
        let employees = JSON.parse(localStorage.getItem('hrmis_employees_pro')) || [
            { id: 1, name: "Isabella Rossi", department: "Engineering", email: "i.rossi@hrmis.com", salary: 78000, perfScore: 94 },
            { id: 2, name: "James O'Connor", department: "Product", email: "james@hrmis.com", salary: 82000, perfScore: 89 },
            { id: 3, name: "Priya Kapoor", department: "Marketing", email: "priya@hrmis.com", salary: 67500, perfScore: 91 },
            { id: 4, name: "Daniel Zhao", department: "Sales", email: "dan.zhao@hrmis.com", salary: 71000, perfScore: 87 }
        ];
        
        let leaveRequests = JSON.parse(localStorage.getItem('hrmis_leaves_pro')) || [
            { id: 101, employeeName: "Isabella Rossi", leaveType: "Annual Leave", status: "Approved" },
            { id: 102, employeeName: "James O'Connor", leaveType: "Sick Leave", status: "Pending" }
        ];
        
        let payrollData = JSON.parse(localStorage.getItem('hrmis_payroll_pro')) || [];
        if(payrollData.length === 0 && employees.length) {
            payrollData = employees.map(emp => ({
                id: emp.id,
                employeeName: emp.name,
                salary: emp.salary,
                status: Math.random() > 0.3 ? "Paid" : "Pending"
            }));
            localStorage.setItem('hrmis_payroll_pro', JSON.stringify(payrollData));
        }
        
        function saveAllData() {
            localStorage.setItem('hrmis_employees_pro', JSON.stringify(employees));
            localStorage.setItem('hrmis_leaves_pro', JSON.stringify(leaveRequests));
            localStorage.setItem('hrmis_payroll_pro', JSON.stringify(payrollData));
        }
        
        function getPerformanceView() {
            return employees.map(emp => ({
                employeeName: emp.name,
                score: emp.perfScore,
                status: emp.perfScore >= 90 ? "Excellent" : (emp.perfScore >= 75 ? "Good" : "Needs improvement")
            }));
        }
        
        function getStats() {
            return {
                totalEmp: employees.length,
                pendingLeaves: leaveRequests.filter(l => l.status === "Pending").length,
                processedPercent: payrollData.length ? Math.round((payrollData.filter(p => p.status === "Paid").length / payrollData.length) * 100) : 0
            };
        }
        
        // ---------- PAGE RENDERS (professional) ----------
        let currentPage = 'dashboard';
        
        function renderDashboard() {
            const s = getStats();
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h4><i class="fas fa-users"></i> Total Employees</h4><p>${s.totalEmp}</p></div><div class="stat-icon"><i class="fas fa-user-tie"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h4><i class="fas fa-calendar-check"></i> Pending Leave</h4><p>${s.pendingLeaves}</p></div><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h4><i class="fas fa-chart-line"></i> Payroll Processed</h4><p>${s.processedPercent}%</p></div><div class="stat-icon"><i class="fas fa-percent"></i></div></div>
                </div>
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-chart-pie"></i> <span>HR Analytics Snapshot</span></div>
                    <p>Professional HRMIS dashboard — track workforce metrics, leave balances, and payroll efficiency in real-time.</p>
                    <div style="margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap;"><span class="badge"><i class="fas-regular fa-building"></i> ${employees.length} active members</span><span class="badge"><i class="fas fa-leaf"></i> Performance driven</span></div>
                </div>
            `;
        }
        
        function renderEmployees() {
            let rows = employees.map(emp => `<tr><td><i class="fas fa-user-circle"></i> ${emp.name}</td><td>${emp.department}</td><td>${emp.email}</td><td>$${emp.salary.toLocaleString()}</td></tr>`).join('');
            return `
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-user-plus"></i> <span>Add New Employee</span></div>
                    <div class="form-row" id="employeeFormRow">
                        <div class="form-group"><label>Full name</label><input type="text" id="empName" placeholder="Alex Johnson"></div>
                        <div class="form-group"><label>Department</label><input type="text" id="empDept" placeholder="Engineering"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="empEmail" placeholder="name@company.com"></div>
                        <div class="form-group"><label>Salary (USD)</label><input type="number" id="empSalary" placeholder="65000"></div>
                        <div class="form-group"><button id="addEmployeeBtn" class="btn-sm"><i class="fas fa-save"></i> Add</button></div>
                    </div>
                </div>
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-list-ul"></i> <span>Employee Directory</span></div>
                    <div class="table-responsive"><table><thead><tr><th>Name</th><th>Department</th><th>Email</th><th>Salary</th></tr></thead><tbody id="employeeTableBody">${rows}</tbody></table></div>
                </div>
            `;
        }
        

function renderPayroll() {
            let pRows = payrollData.map(p => `<tr><td>${p.employeeName}</td><td>$${p.salary.toLocaleString()}</td><td><span class="badge ${p.status === 'Paid' ? '' : 'badge-warning'}">${p.status}</span></td></tr>`).join('');
            return `
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-coins"></i> <span>Payroll Management</span></div>
                    <div class="table-responsive"><table><thead><tr><th>Employee</th><th>Salary</th><th>Status</th></tr></thead><tbody>${pRows}</tbody></table></div>
                    <div style="margin-top:1.5rem"><button id="syncPayrollBtn" class="btn-sm"><i class="fas fa-sync-alt"></i> Sync Payroll Records</button></div>
                </div>
            `;
        }
        
        function renderLeave() {
            let lRows = leaveRequests.map(l => `<tr><td>${l.employeeName}</td><td>${l.leaveType}</td><td><span class="badge ${l.status === 'Pending' ? 'badge-warning' : ''}">${l.status}</span></td></tr>`).join('');
            return `
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-paper-plane"></i> <span>Submit Leave Request</span></div>
                    <div class="form-row" id="leaveFormRow">
                        <div class="form-group"><label>Employee Name</label><input type="text" id="leaveEmpName" list="empList" placeholder="Select employee"><datalist id="empList">${employees.map(e => `<option value="${e.name}">`).join('')}</datalist></div>
                        <div class="form-group"><label>Leave Type</label><select id="leaveTypeSelect"><option>Sick Leave</option><option>Annual Leave</option><option>Maternity</option><option>Bereavement</option></select></div>
                        <div class="form-group"><button id="submitLeaveReqBtn" class="btn-sm"><i class="fas fa-check-circle"></i> Submit</button></div>
                    </div>
                </div>
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-calendar-alt"></i> <span>Leave Requests Overview</span></div>
                    <div class="table-responsive"><table><thead><tr><th>Employee</th><th>Type</th><th>Status</th></tr></thead><tbody id="leaveTableBody">${lRows}</tbody></table></div>
                </div>
            `;
        }
        
        function renderPerformance() {
            let perf = getPerformanceView();
            let rows = perf.map(p => `<tr><td><i class="fas fa-chart-simple"></i> ${p.employeeName}</td><td>${p.score}%</td><td><span class="badge">${p.status}</span></td></tr>`).join('');
            return `
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-chart-line"></i> <span>Performance & KPIs</span></div>
                    <div class="table-responsive"><table><thead><tr><th>Employee</th><th>KPI Score</th><th>Performance Status</th></tr></thead><tbody>${rows}</tbody></table></div>
                    <div class="footer-note" style="margin-top:1rem"><i class="fas fa-chart-simple"></i> Quarterly review based on OKRs</div>
                </div>
            `;
        }
        
        function getPageContent(page) {
            if(page === 'dashboard') return renderDashboard();
            if(page === 'employees') return renderEmployees();
            if(page === 'payroll') return renderPayroll();
            if(page === 'leave') return renderLeave();
            if(page === 'performance') return renderPerformance();
            return renderDashboard();
        }
        
        function attachDynamicEvents(page) {
            if(page === 'employees') {
                const addBtn = document.getElementById('addEmployeeBtn');
                if(addBtn) addBtn.onclick = () => {
                    const name = document.getElementById('empName')?.value.trim();
                    const dept = document.getElementById('empDept')?.value.trim();
                    const email = document.getElementById('empEmail')?.value.trim();
                    const salary = parseFloat(document.getElementById('empSalary')?.value);
                    if(!name || !dept || !email || isNaN(salary)) { alert("Please fill all fields correctly"); return; }
                    const newId = employees.length ? Math.max(...employees.map(e=>e.id)) + 1 : 1;
                    const newEmp = { id: newId, name, department: dept, email, salary, perfScore: 80 };
                    employees.push(newEmp);
                    payrollData.push({ id: newId, employeeName: name, salary, status: "Pending" });
                    saveAllData();
                    refreshCurrentView('employees');
                };
            }
            if(page === 'leave') {
                const leaveBtn = document.getElementById('submitLeaveReqBtn');
                if(leaveBtn) leaveBtn.onclick = () => {
                    const empName = document.getElementById('leaveEmpName')?.value.trim();
                    const type = document.getElementById('leaveTypeSelect')?.value;
                    if(!empName) { alert("Enter employee name"); return; }
                    leaveRequests.push({ id: Date.now(), employeeName: empName, leaveType: type, status: "Pending" });
                    saveAllData();
                    refreshCurrentView('leave');
                };
            }
            if(page === 'payroll') {
                const syncBtn = document.getElementById('syncPayrollBtn');
                if(syncBtn) syncBtn.onclick = () => {
                    const updatedPayroll = employees.map(emp => {
                        const existing = payrollData.find(p => p.employeeName === emp.name);
                        if(existing) return existing;
                        return { id: emp.id, employeeName: emp.name, salary: emp.salary, status: "Pending" };
                    });
                    payrollData.length = 0;
                    payrollData.push(...updatedPayroll);
                    saveAllData();
                    refreshCurrentView('payroll');
                };
            }
        }
        
        function refreshCurrentView(page) {
            const mainContainer = document.getElementById('dynamicMainContent');
            if(mainContainer) {
                mainContainer.innerHTML = getPageContent(page);
                attachDynamicEvents(page);
                updateActiveNav(page);
            }
        }
        
        function updateActiveNav(activePage) {
            document.querySelectorAll('.sidebar-nav a').forEach(link => {
                const pageVal = link.getAttribute('data-page');
                if(pageVal === activePage) link.classList.add('active');
                else link.classList.remove('active');
            });
        }
        
        function buildAppShell(initialPage) {
            currentPage = initialPage;
            return `
                <div class="sidebar" id="appSidebar">
                    <div class="sidebar-header"><i class="fas fa-chart-line"></i><h3>HRMIS Pro</h3></div>
                    <div class="sidebar-nav">
                        <ul>
                            <li><a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                            <li><a href="#" data-page="employees"><i class="fas fa-users"></i> Employees</a></li>
                            <li><a href="#" data-page="payroll"><i class="fas fa-coins"></i> Payroll</a></li>
                            <li><a href="#" data-page="leave"><i class="fas fa-calendar-week"></i> Leave</a></li>
                            <li><a href="#" data-page="performance"><i class="fas fa-chart-line"></i> Performance</a></li>
                        </ul>
                    </div>
                </div>
                <div class="main-content">
                    <div id="dynamicMainContent">${getPageContent(initialPage)}</div>
                    <div class="footer-note"><i class="fas fa-lock"></i> Secure HRMIS · Data stored locally</div>
                </div>
            `;
        }
        
        function initAppRouter() {
            const appRoot = document.getElementById('appRoot');
            appRoot.innerHTML = '';
            const container = document.createElement('div');
            container.className = 'app-container';
            const mobileTop = document.createElement('div');
            mobileTop.className = 'mobile-header';
            mobileTop.innerHTML = `<button class="menu-icon" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><div style="font-weight:600;"><i class="fas fa-chart-line"></i> HRMIS Pro</div><div></div>`;
            container.appendChild(mobileTop);
            const flexDiv = document.createElement('div');
            flexDiv.style.display = 'flex';
            flexDiv.style.flex = '1';
            flexDiv.id = 'appFlexWrapper';
            container.appendChild(flexDiv);
            appRoot.appendChild(container);
            
            function renderFull() {
                const wrapper = document.getElementById('appFlexWrapper');
                if(wrapper) wrapper.innerHTML = buildAppShell(currentPage);
                attachNavEvents();
                attachDynamicEvents(currentPage);
                const mobileBtn = document.getElementById('mobileMenuBtn');
                if(mobileBtn) mobileBtn.onclick = () => { document.getElementById('appSidebar')?.classList.toggle('open'); };
                document.addEventListener('click', function closeSidebar(e) {
                    const sidebar = document.getElementById('appSidebar');
                    if(window.innerWidth < 768 && sidebar && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !mobileBtn?.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            }
            function attachNavEvents() {
                document.querySelectorAll('.sidebar-nav a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = link.getAttribute('data-page');
                        if(page) {
                            currentPage = page;
                            renderFull();
                            if(window.innerWidth < 768) document.getElementById('appSidebar')?.classList.remove('open');
                        }
                    });
                });
            }
            renderFull();
        }
        
        // LOGIN
        function showLogin() {
            const loginDiv = document.getElementById('loginRoot');
            loginDiv.innerHTML = `
                <div class="login-card">
                    <div class="login-header"><div class="login-logo"><i class="fas fa-chart-line"></i></div><h2>HRMIS Professional</h2><p style="color: var(--text-muted);">Secure access · Human Resources Suite</p></div>
                    <form id="loginFormPro">
                        <div class="input-group"><i class="fas fa-envelope"></i><input type="text" id="loginUser" placeholder="Username / Email" autocomplete="off"></div>
                        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="Password"></div>
                        <button type="submit"><i class="fas fa-arrow-right-to-bracket"></i> Sign in</button>
                    </form>
                    <div style="margin-top: 1.8rem; text-align:center; font-size:0.75rem;"><span class="badge">Demo: admin / admin123</span></div>
                </div>
            `;
            const form = document.getElementById('loginFormPro');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('loginUser').value;
                const p = document.getElementById('loginPass').value;
                if(u === 'admin' && p === 'admin123') {
                    document.getElementById('loginRoot').style.display = 'none';
                    document.getElementById('appRoot').style.display = 'block';
                    initAppRouter();
                } else { alert('Invalid credentials. Use admin / admin123'); }
            });
        }
        
        initTheme();
        document.getElementById('globalThemeToggle').addEventListener('click', toggleTheme);
        showLogin();
    </script>
</body>
</html>
